version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - backend-net

  pgadmin:
    image: dpage/pgadmin4:7
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db
    networks:
      - backend-net

  app:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    user: "1000:1000"
    restart: on-failure
    env_file:
      - ./BackEnd/.env
    volumes:
      - ./BackEnd:/usr/src/app:z
    depends_on:
      - db
    ports:
      - "${APP_PORT}:${APP_PORT}"
    networks:
      - backend-net

volumes:
  db_data:

networks:
  backend-net:
    driver: bridge
